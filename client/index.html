<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexdame</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui-overlay" class="active">
    <div id="menu-screen" class="menu-panel">
      <h1>HEXDAME</h1>
      <button class="btn" id="btn-local">LOCAL 2-PLAYER</button>
      <button class="btn" id="btn-ai">VS COMPUTER</button>
      <button class="btn" id="btn-online" disabled style="opacity:0.4">ONLINE (S5)</button>
    </div>
    <div id="game-over-screen" class="game-over-panel hidden">
      <h2>GAME OVER</h2>
      <p id="winner-text"></p>
      <button class="btn" id="btn-menu">MAIN MENU</button>
    </div>
  </div>

  <div class="turn-indicator hidden" id="turn-indicator"></div>

  <script src="js/hex.js"></script>
  <script src="js/board.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/game.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const overlay = document.getElementById('ui-overlay');
    const menuScreen = document.getElementById('menu-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const winnerText = document.getElementById('winner-text');
    const turnIndicator = document.getElementById('turn-indicator');

    const gc = new GameController(canvas);

    gc._onGameOver = (winner) => {
      turnIndicator.classList.add('hidden');
      winnerText.textContent = winner === PLAYER1
        ? (gc.gameMode === 'local' ? 'PLAYER 1 WINS' : 'YOU WIN!')
        : (gc.gameMode === 'local' ? 'PLAYER 2 WINS' : 'COMPUTER WINS');
      gameOverScreen.classList.remove('hidden');
      overlay.classList.add('active');
    };

    gc._onTurnChange = (turn, mustJump, mode) => {
      let txt = turn === PLAYER1
        ? (mode === 'local' ? "PLAYER 1'S TURN" : "YOUR TURN")
        : (mode === 'local' ? "PLAYER 2'S TURN" : "COMPUTER'S TURN");
      if (mustJump) txt += ' — MUST JUMP';
      turnIndicator.textContent = txt;
      turnIndicator.classList.remove('hidden');
    };

    function startGame(mode) {
      overlay.classList.remove('active');
      menuScreen.classList.add('hidden');
      gameOverScreen.classList.add('hidden');
      gc.startGame(mode);
    }

    document.getElementById('btn-local').addEventListener('click', () => startGame('local'));
    document.getElementById('btn-ai').addEventListener('click',    () => startGame('ai'));
    document.getElementById('btn-menu').addEventListener('click',  () => {
      gameOverScreen.classList.add('hidden');
      menuScreen.classList.remove('hidden');
      overlay.classList.add('active');
    });

    canvas.addEventListener('click', (e) => {
      const r = canvas.getBoundingClientRect();
      gc.handleClick(e.clientX - r.left, e.clientY - r.top);
    });
  </script>
</body>
</html>
